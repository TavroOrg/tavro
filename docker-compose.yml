name: tavro

x-risk-worker-base: &risk_worker_base
  image: tavro-risk-worker:local
  build:
    context: .
    dockerfile: Dockerfile.worker

services:

  # ── PostgreSQL 16 + AGE + pgvector + Risk schemas ────────────────────────────
  tavro-postgres:
    build:
      context: .
      dockerfile: tavro_Dockerfile
      args:
        AGE_VERSION: "1.5.0"
        PG_MAJOR: "16"
    container_name: tavro-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    environment:
      POSTGRES_USER:                     ${POSTGRES_USER}
      POSTGRES_PASSWORD:                 ${POSTGRES_PASSWORD}
      POSTGRES_DB:                       tavro
      POSTGRES_SHARED_PRELOAD_LIBRARIES: "age"
    ports:
      - "5433:5432"       # keep open for Postico access on your Mac
    volumes:
      - tavro_pgdata:/var/lib/postgresql/data
      - ./sql:/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d tavro"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  # ── Temporal — Workflow Engine ───────────────────────────────────────────────
  risk-temporal:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: risk-temporal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    command: temporal server start-dev --ip 0.0.0.0 --ui-public-path /temporal --ui-port 8233
    ports:
      - "7233:7233"   # Temporal gRPC
      - "8233:8233"   # Temporal web UI → http://localhost:8233/temporal

  # ── FastAPI — Unified API (Digital Twin + Risk Classification) ───────────────
  tavro-api:
    build:
      context: .
      dockerfile: tavro_api/Dockerfile
    container_name: tavro-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g
    depends_on:
      tavro-postgres:
        condition: service_healthy
      risk-temporal:
        condition: service_started
    environment:
      # Single connection string for all DB access (asyncpg driver prefix added in code)
      DATABASE_URL:               postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@tavro-postgres:5432/tavro
      # AI keys
      ANTHROPIC_API_KEY:          ${ANTHROPIC_API_KEY}
      CREWAI_LLM_MODEL:           ${CREWAI_LLM_MODEL:-anthropic/claude-sonnet-4-6}
      CREWAI_MAX_TOKENS:          ${CREWAI_MAX_TOKENS:-4096}
      CREWAI_TXT_SEARCH_EMBEDDER: ${CREWAI_TXT_SEARCH_EMBEDDER:-onnx}
      AZURE_AI_FOUNDRY_AGENT_API_VERSION: '${AZURE_AI_FOUNDRY_AGENT_API_VERSION:-v1}'
      AZURE_AI_FOUNDRY_API_VERSION: '${AZURE_AI_FOUNDRY_API_VERSION:-2024-02-15-preview}'
      AZURE_AI_FOUNDRY_DEPLOYMENT: '${AZURE_AI_FOUNDRY_DEPLOYMENT:-}'
      AZURE_AI_FOUNDRY_ENDPOINT: '${AZURE_AI_FOUNDRY_ENDPOINT:-}'
      AZURE_AI_FOUNDRY_KEY: '${AZURE_AI_FOUNDRY_KEY:-}'
      # DefaultAzureCredential uses these for local Docker runs. Azure deployments
      # can use managed identity instead.
      AZURE_CLIENT_ID: '${AZURE_AI_FOUNDRY_CLIENT_ID:-}'
      AZURE_TENANT_ID: '${AZURE_AI_FOUNDRY_TENANT_ID:-}'
      AZURE_CLIENT_SECRET: '${AZURE_AI_FOUNDRY_CLIENT_SECRET:-}'
      OPENAI_API_KEY:             ${OPENAI_API_KEY}
      RESEARCH_MAX_OUTPUT_TOKENS: "4096"
      RESEARCH_MAX_SEARCH_TURNS:  "3"
      # Risk schema names
      CORE_DB_NAME:            core
      CURATED_DB_NAME:         curated
      RISK_MANAGEMENT_DB_NAME: risk_management
      # Temporal
      TEMPORAL_ADDRESS:     risk-temporal:7233
      LOCAL_AGENT_CARD_DIR: /app/agent_cards
      RISK_CLASSIFY_URL:    ${RISK_CLASSIFY_URL}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8000:8000"
    volumes:
      - ./tavro_api:/app                    # live reload — tavro_api code
      - ./services:/app/services:ro         # live reload — risk services
      - ./utils:/app/utils:ro               # live reload — risk utils
      - ./sql:/sql:ro                       # core DDL files for startup bootstrap
      - ./tavro_api/agent_cards:/app/agent_cards      # agent card output dir
      - /var/run/docker.sock:/var/run/docker.sock:ro  # docker log streaming
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

  copilot-sdk:
    build:
      context: ./tavro_app/copilot-server
      dockerfile: Dockerfile
    container_name: tavro-copilot-sdk
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    environment:
      # Docker-internal URL for the Tavro MCP server.
      # The copilot-server registers this with each Copilot SDK session so the
      # SDK can automatically route tool calls to Tavro's MCP backend.
      MCP_INTERNAL_URL: http://risk-mcp-server:9001/zitadel/mcp
      GITHUB_COPILOT_TOKEN: ${GITHUB_COPILOT_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_AI_FOUNDRY_ENDPOINT: ${AZURE_AI_FOUNDRY_ENDPOINT:-}
      AZURE_AI_FOUNDRY_KEY: ${AZURE_AI_FOUNDRY_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "4001:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

  # ── Admin Portal — FastAPI (API + React UI) on port 7000 ─────────────────────
  tavro-admin:
    build:
      context: .
      dockerfile: tavro_admin/Dockerfile
    container_name: tavro-admin
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      tavro-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:          postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@tavro-postgres:5432/tavro
      # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      ADMIN_ENCRYPTION_KEY:  ${ADMIN_ENCRYPTION_KEY:-}
      AGENT_CARD_DIR:        /app/agent_cards
      RISK_CLASSIFY_URL:     http://tavro-api:8000/api/v1/risk/classify-risk
      RISK_CONCURRENCY:      "2"
      RISK_TIMEOUT_S:        "600"
      # Used by the backend auth dependency to validate tokens against ZITADEL's userinfo endpoint
      ZITADEL_ISSUER:        ${VITE_ZITADEL_ISSUER}
      # Docker-internal URL to reach ZITADEL from inside the container network
      ZITADEL_INTERNAL_URL:  http://zitadel-api:8080
      ZITADEL_INTERNAL_HOST: ${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}
    ports:
      - "7000:7000"
    volumes:
      - ./sql:/sql:ro
      - ./tavro_api/agent_cards:/app/agent_cards
      # Runtime auth config written by zitadel-configure-app; served at /runtime/tavro-admin-runtime-config.json
      - tavro_runtime_config:/app/static/runtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # docker log streaming
      - ./.env:/app/.env:rw                           # connector credential read/write
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── React App — served by Nginx ──────────────────────────────────────────────
  tavro-app:
    build:
      context: ./tavro_app
      dockerfile: Dockerfile
      args:
        VITE_TWIN_API_URL: ""   # empty = use relative /api/ paths via nginx proxy
        VITE_ZITADEL_ISSUER: ${VITE_ZITADEL_ISSUER}
        VITE_ZITADEL_CLIENT_ID: ${VITE_ZITADEL_CLIENT_ID}
        VITE_ZITADEL_REDIRECT_PATH: ${VITE_ZITADEL_REDIRECT_PATH:-/auth/callback}
        VITE_ZITADEL_SCOPE: ${VITE_ZITADEL_SCOPE:-openid profile email}
        VITE_MCP_URL: ${VITE_MCP_URL:-http://localhost:9001/zitadel/mcp}
    container_name: tavro-app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
    depends_on:
      tavro-api:
        condition: service_healthy
      copilot-sdk:
        condition: service_healthy
    ports:
      - "9000:80"
    volumes:
      - tavro_runtime_config:/usr/share/nginx/html/runtime:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  proxy:
    image: ${TRAEFIK_IMAGE}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.forwardedHeaders.insecure=true
      - --entrypoints.websecure.address=:443
      - --api.dashboard=${TRAEFIK_DASHBOARD_ENABLED}
      - --api.insecure=false
      - --ping=true
      - --ping.entrypoint=web
      - --log.level=${TRAEFIK_LOG_LEVEL}
      - --accesslog=${TRAEFIK_ACCESSLOG_ENABLED}
    ports:
      - "8080:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      zitadel-api:
        condition: service_started
      zitadel-login:
        condition: service_started

  zitadel-api:
    image: ghcr.io/zitadel/zitadel:${ZITADEL_VERSION}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    user: "0"
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY}"
    environment:
      ZITADEL_PORT: 8080
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_DOMAIN}
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNALPORT}
      ZITADEL_EXTERNALSECURE: ${ZITADEL_EXTERNALSECURE}
      ZITADEL_TLS_ENABLED: false

      ZITADEL_DATABASE_POSTGRES_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@tavro-postgres:5432/tavro?sslmode=disable

      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: false
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Automatically Initialized IAM_LOGIN_CLIENT
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: ${LOGIN_CLIENT_PAT_EXPIRATION}
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel/bootstrap/admin.pat
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: tavro-zitadel-admin
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Tavro ZITADEL bootstrap admin
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: ${ZITADEL_ADMIN_PAT_EXPIRATION}

      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: true
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: ${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/ui/v2/login/login?samlRequest=

      ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: ${ZITADEL_ACCESS_LOG_STDOUT_ENABLED}

      ZITADEL_INSTRUMENTATION_TRACE_EXPORTER_TYPE: ${ZITADEL_INSTRUMENTATION_TRACE_EXPORTER_TYPE}
      ZITADEL_INSTRUMENTATION_TRACE_EXPORTER_ENDPOINT: ${ZITADEL_INSTRUMENTATION_TRACE_EXPORTER_ENDPOINT}
      ZITADEL_INSTRUMENTATION_TRACE_EXPORTER_INSECURE: ${ZITADEL_INSTRUMENTATION_TRACE_EXPORTER_INSECURE}
      ZITADEL_INSTRUMENTATION_SERVICENAME: ${ZITADEL_INSTRUMENTATION_SERVICENAME}

      ZITADEL_CACHES_CONNECTORS_REDIS_ENABLED: ${ZITADEL_CACHES_CONNECTORS_REDIS_ENABLED}
      ZITADEL_CACHES_CONNECTORS_REDIS_URL: ${ZITADEL_CACHES_CONNECTORS_REDIS_URL}
      ZITADEL_CACHES_INSTANCE_CONNECTOR: ${ZITADEL_CACHES_INSTANCE_CONNECTOR}
      ZITADEL_CACHES_MILESTONES_CONNECTOR: ${ZITADEL_CACHES_MILESTONES_CONNECTOR}
      ZITADEL_CACHES_ORGANIZATION_CONNECTOR: ${ZITADEL_CACHES_ORGANIZATION_CONNECTOR}

    healthcheck:
      test:
        - CMD
        - /app/zitadel
        - ready
      interval: 20s
      timeout: 30s
      retries: 20
      start_period: 90s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:rw
    depends_on:
      tavro-postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true

      - traefik.http.services.zitadel-api.loadbalancer.server.port=8080
      - traefik.http.services.zitadel-api.loadbalancer.server.scheme=h2c

      - traefik.http.middlewares.zitadel-strip-api.stripprefix.prefixes=/api
      - traefik.http.middlewares.zitadel-strip-api.stripprefix.forceSlash=false

      # Note: no dedicated gRPC router needed. All gRPC and Connect-RPC traffic
      # is handled by the catch-all router below since the backend already uses h2c.

      - traefik.http.routers.zitadel-api-alias-web.rule=Host(`${ZITADEL_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.zitadel-api-alias-web.entrypoints=web
      - traefik.http.routers.zitadel-api-alias-web.middlewares=zitadel-strip-api
      - traefik.http.routers.zitadel-api-alias-web.service=zitadel-api
      - traefik.http.routers.zitadel-api-alias-web.priority=200

      - traefik.http.routers.zitadel-api-alias-websecure.rule=Host(`${ZITADEL_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.zitadel-api-alias-websecure.entrypoints=websecure
      - traefik.http.routers.zitadel-api-alias-websecure.tls=true
      - traefik.http.routers.zitadel-api-alias-websecure.middlewares=zitadel-strip-api
      - traefik.http.routers.zitadel-api-alias-websecure.service=zitadel-api
      - traefik.http.routers.zitadel-api-alias-websecure.priority=200

      - traefik.http.routers.zitadel-canonical-web.rule=Host(`${ZITADEL_DOMAIN}`) && !PathPrefix(`/ui/v2/login`) && !PathPrefix(`/api`) && !Path(`/`)
      - traefik.http.routers.zitadel-canonical-web.entrypoints=web
      - traefik.http.routers.zitadel-canonical-web.service=zitadel-api
      - traefik.http.routers.zitadel-canonical-web.priority=100

      - traefik.http.routers.zitadel-canonical-websecure.rule=Host(`${ZITADEL_DOMAIN}`) && !PathPrefix(`/ui/v2/login`) && !PathPrefix(`/api`) && !Path(`/`)
      - traefik.http.routers.zitadel-canonical-websecure.entrypoints=websecure
      - traefik.http.routers.zitadel-canonical-websecure.tls=true
      - traefik.http.routers.zitadel-canonical-websecure.service=zitadel-api
      - traefik.http.routers.zitadel-canonical-websecure.priority=100

  zitadel-login:
    build:
      context: .
      dockerfile: tavro_zitadel_login.Dockerfile
      args:
        ZITADEL_VERSION: ${ZITADEL_VERSION}
    image: tavro-zitadel-login:${ZITADEL_VERSION}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384m
    user: "0"
    environment:
      ZITADEL_API_URL: http://zitadel-api:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: Host:localhost:8080,X-Forwarded-Proto:http

      # Future-ready placeholders for upcoming Login OTEL support.
      OTEL_SERVICE_NAME: ${LOGIN_OTEL_SERVICE_NAME}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${LOGIN_OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${LOGIN_OTEL_EXPORTER_OTLP_PROTOCOL}
    healthcheck:
      test:
        - CMD
        - /bin/sh
        - -c
        - node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
    depends_on:
      zitadel-api:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.services.zitadel-login.loadbalancer.server.port=3000

      - traefik.http.middlewares.zitadel-root-rewrite.replacepath.path=/ui/v2/login/

      - traefik.http.routers.zitadel-root-web.rule=Host(`${ZITADEL_DOMAIN}`) && Path(`/`)
      - traefik.http.routers.zitadel-root-web.entrypoints=web
      - traefik.http.routers.zitadel-root-web.middlewares=zitadel-root-rewrite
      - traefik.http.routers.zitadel-root-web.service=zitadel-login
      - traefik.http.routers.zitadel-root-web.priority=400

      - traefik.http.routers.zitadel-root-websecure.rule=Host(`${ZITADEL_DOMAIN}`) && Path(`/`)
      - traefik.http.routers.zitadel-root-websecure.entrypoints=websecure
      - traefik.http.routers.zitadel-root-websecure.tls=true
      - traefik.http.routers.zitadel-root-websecure.middlewares=zitadel-root-rewrite
      - traefik.http.routers.zitadel-root-websecure.service=zitadel-login
      - traefik.http.routers.zitadel-root-websecure.priority=400

      - traefik.http.routers.zitadel-login-web.rule=Host(`${ZITADEL_DOMAIN}`) && PathPrefix(`/ui/v2/login`)
      - traefik.http.routers.zitadel-login-web.entrypoints=web
      - traefik.http.routers.zitadel-login-web.service=zitadel-login
      - traefik.http.routers.zitadel-login-web.priority=250

      - traefik.http.routers.zitadel-login-websecure.rule=Host(`${ZITADEL_DOMAIN}`) && PathPrefix(`/ui/v2/login`)
      - traefik.http.routers.zitadel-login-websecure.entrypoints=websecure
      - traefik.http.routers.zitadel-login-websecure.tls=true
      - traefik.http.routers.zitadel-login-websecure.service=zitadel-login
      - traefik.http.routers.zitadel-login-websecure.priority=250

  zitadel-configure-app:
    image: node:20-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    working_dir: /work
    command:
      - /bin/sh
      - -c
      - node /work/iam/configure-zitadel-app.mjs && tail -f /dev/null
    environment:
      ZITADEL_API_URL: http://zitadel-api:8080
      ZITADEL_REQUEST_HOST: ${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}
      ZITADEL_REQUEST_PROTO: ${ZITADEL_PUBLIC_SCHEME}
      ZITADEL_ADMIN_TOKEN_FILE: /zitadel/bootstrap/admin.pat
      TAVRO_RUNTIME_CONFIG_FILE: /runtime/tavro-runtime-config.json
      VITE_ZITADEL_ISSUER: ${VITE_ZITADEL_ISSUER}
      VITE_ZITADEL_REDIRECT_PATH: ${VITE_ZITADEL_REDIRECT_PATH:-/auth/callback}
      VITE_ZITADEL_SCOPE: ${VITE_ZITADEL_SCOPE:-openid profile email}
      ZITADEL_PROJECT_NAME: ${ZITADEL_PROJECT_NAME:-tavro-mcp}
      ZITADEL_APP_NAME: ${ZITADEL_APP_NAME:-tavro-mcp}
      ZITADEL_APP_REDIRECT_URIS: ${ZITADEL_APP_REDIRECT_URIS}
      ZITADEL_APP_POST_LOGOUT_REDIRECT_URIS: ${ZITADEL_APP_POST_LOGOUT_REDIRECT_URIS}
      ZITADEL_ADMIN_ROLE: ${ZITADEL_ADMIN_ROLE:-portal_admin}
      VITE_ADMIN_ZITADEL_SCOPE: ${VITE_ADMIN_ZITADEL_SCOPE:-openid profile email urn:zitadel:iam:user:resourceowner urn:zitadel:iam:org:project:roles}
      TAVRO_ADMIN_RUNTIME_CONFIG_FILE: /runtime/tavro-admin-runtime-config.json
    volumes:
      - ./iam:/work/iam:ro
      - zitadel-bootstrap:/zitadel/bootstrap:ro
      - tavro_runtime_config:/runtime:rw
    depends_on:
      zitadel-api:
        condition: service_started

  redis:
    image: ${REDIS_IMAGE}
    restart: unless-stopped
    profiles:
      - cache
    command:
      - --save
      - ""
      - --appendonly
      - "no"

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE}
    restart: unless-stopped
    profiles:
      - observability
    command:
      - --config=/etc/otelcol/config.yaml
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro

# ── MCP Server — FastMCP Authentication & Tool Exposure ──────────────────────  
  risk-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: risk-mcp-server
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    ports:
      - "9001:9001"   # 9000 is taken by tavro-app; host port is 9001
    environment:
      DATABASE_URL:         postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@tavro-postgres:5432/tavro
      CORE_DB_NAME:            core
      CURATED_DB_NAME:         curated
      RISK_MANAGEMENT_DB_NAME: risk_management
      LOCAL_AGENT_CARD_DIR: /app/agent_cards
      mcp_host:          localhost
      mcp_port:          "9001"
      ZITADEL_ISSUER: ${VITE_ZITADEL_ISSUER}
      ZITADEL_CONFIG_URL: http://proxy
      ZITADEL_INTERNAL_BASE_URL: http://proxy
      ZITADEL_INTERNAL_HOST_HEADER: ${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}
      TAVRO_RUNTIME_CONFIG_FILE: /app/runtime/tavro-runtime-config.json
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID:-}
      ZITADEL_REDIRECT_PATH: ${ZITADEL_REDIRECT_PATH:-/auth/callback}
      ZITADEL_SCOPES: ${ZITADEL_SCOPES:-openid profile email}
      VITE_ZITADEL_ISSUER: ${VITE_ZITADEL_ISSUER}
      VITE_ZITADEL_CLIENT_ID: ${VITE_ZITADEL_CLIENT_ID}
      TAVRO_API_URL:             ${TAVRO_API_URL}
      COMPANY_API_BASE_URL:      ${COMPANY_API_BASE_URL}
      RISK_CLASSIFY_URL:         ${RISK_CLASSIFY_URL}
      RISK_CLASSIFY_FALLBACK_URL: ${RISK_CLASSIFY_FALLBACK_URL}
      GITHUB_CLIENT_ID:     ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      JWT_SIGNING_KEY:      ${JWT_SIGNING_KEY}
      OPENAI_API_KEY:       ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY}
    volumes:
      - ./tavro_api/agent_cards:/app/agent_cards
      - tavro_runtime_config:/app/runtime:ro
    depends_on:
      tavro-postgres:
        condition: service_healthy
      zitadel-api:
        condition: service_healthy
      tavro-api:
        condition: service_healthy
      proxy:
        condition: service_started
      zitadel-configure-app:
        condition: service_started

  # ── Risk Worker — idle container for manual commands ─────────────────────────
  risk-worker:
    <<: *risk_worker_base
    container_name: risk-worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    command: tail -f /dev/null
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@tavro-postgres:5432/tavro
      DROP_DIR: /app/sample-data
      API_URL:  http://tavro-api:8000/api/v1/risk/classify-risk
    volumes:
      - ./sample-data:/app/sample-data
    depends_on:
      tavro-postgres:
        condition: service_healthy

# ── Sample Loader — one-shot: load sample agent cards ────────────────────────
  risk-sample-loader:
    <<: *risk_worker_base
    container_name: risk-sample-loader
    profiles: ["manual"]
    deploy:
      resources:
        limits:
          memory: 2g
    command: python -u worker.py
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@tavro-postgres:5432/tavro
      DROP_DIR: /app/sample-data
      API_URL:  http://tavro-api:8000/api/v1/risk/classify-risk
    volumes:
      - ./sample-data:/app/sample-data
    depends_on:
      tavro-postgres:
        condition: service_healthy
      tavro-api:
        condition: service_healthy

  # ── Connector — one-shot: pull agent cards from external sources ──────────────
  risk-connector:
    profiles: ["manual"]
    <<: *risk_worker_base
    container_name: risk-connector
    deploy:
      resources:
        limits:
          memory: 2g
    command: python -u run_connectors.py
    environment:
      DATABASE_URL:         postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@tavro-postgres:5432/tavro
      AZURE_CLIENT_ID:      ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET:  ${AZURE_CLIENT_SECRET}
      AZURE_TENANT_ID:      ${AZURE_TENANT_ID}
      AZURE_SCOPE:          ${AZURE_SCOPE}
      AZURE_ORG_URL:        ${AZURE_ORG_URL}
    depends_on:
      tavro-postgres:
        condition: service_healthy
      tavro-api:
        condition: service_healthy

volumes:
  tavro_pgdata:
  zitadel-bootstrap:
  tavro_runtime_config:



