name: Auto-merge PRs to dev at 6PM IST
on:
  workflow_dispatch:
  schedule:
   - cron: '00 05 * * 1-5'  # 6:00 PM IST (UTC+5:30) = 12:30 UTC, weekdays only
    
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge open PRs targeting dev based on labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // Label rules
            const MERGE_LABEL    = 'enhancement';   // PRs with this label will be merged
            const SKIP_LABEL     = 'help wanted';   // PRs with this label will be skipped

            // Fetch all open PRs targeting dev
            const { data: prs } = await github.rest.pulls.list({
              owner, repo,
              state: 'open',
              base: 'dev',
              per_page: 100,
            });

            if (prs.length === 0) {
              core.info('No open PRs targeting dev. Nothing to do.');
              return;
            }

            const results = { merged: [], skipped: [], ignored: [] };

            for (const pr of prs) {
              core.info(`Processing PR #${pr.number}: ${pr.title}`);

              const labels = pr.labels.map(l => l.name.toLowerCase());
              const hasReadyLabel = labels.includes(MERGE_LABEL.toLowerCase());
              const hasSkipLabel  = labels.includes(SKIP_LABEL.toLowerCase());

              // Skip PRs marked as not ready
              if (hasSkipLabel) {
                core.info(`PR #${pr.number} has '${SKIP_LABEL}' label — skipping.`);
                results.skipped.push({ number: pr.number, title: pr.title, reason: `'${SKIP_LABEL}' label` });
                continue;
              }

              // Only merge PRs explicitly marked as ready
              if (!hasReadyLabel) {
                core.info(`PR #${pr.number} has no '${MERGE_LABEL}' label — ignoring.`);
                results.ignored.push({ number: pr.number, title: pr.title, reason: 'no ready label' });
                continue;
              }

              // Check mergeability
              const { data: detail } = await github.rest.pulls.get({
                owner, repo, pull_number: pr.number,
              });

              if (detail.mergeable === false) {
                core.warning(`PR #${pr.number} has conflicts — skipping.`);
                results.skipped.push({ number: pr.number, title: pr.title, reason: 'merge conflict' });
                continue;
              }

              // Check all status checks pass
              const { data: checks } = await github.rest.checks.listForRef({
                owner, repo,
                ref: pr.head.sha,
              });

              const failed = checks.check_runs.filter(
                c => c.status === 'completed' &&
                     c.conclusion !== 'success' &&
                     c.conclusion !== 'skipped' &&
                     c.conclusion !== 'neutral'
              );

              if (failed.length > 0) {
                core.warning(`PR #${pr.number} has failing checks — skipping.`);
                results.skipped.push({ number: pr.number, title: pr.title, reason: `failing checks: ${failed.map(c => c.name).join(', ')}` });
                continue;
              }

              // Merge the PR
              try {
                await github.rest.pulls.merge({
                  owner, repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                });
                core.info(`PR #${pr.number} merged successfully.`);
                results.merged.push({ number: pr.number, title: pr.title });
              } catch (err) {
                core.warning(`PR #${pr.number} could not be merged: ${err.message} — skipping.`);
                results.skipped.push({ number: pr.number, title: pr.title, reason: err.message });
              }
            }

            // Save summary for the notification step
            core.exportVariable('MERGED_COUNT',  results.merged.length);
            core.exportVariable('SKIPPED_COUNT', results.skipped.length);
            core.exportVariable('IGNORED_COUNT', results.ignored.length);
            core.exportVariable('MERGE_SUMMARY', JSON.stringify(results, null, 2));

      - name: Send email summary
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: GitHub Actions <${{ secrets.MAIL_USERNAME }}>
          subject: "[Dev merge] ${{ env.MERGED_COUNT }} merged, ${{ env.SKIPPED_COUNT }} skipped, ${{ env.IGNORED_COUNT }} ignored — ${{ github.repository }}"
          body: |
            Scheduled 6 PM IST auto-merge run completed.

            Repository : ${{ github.repository }}
            Run URL    : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Summary    : ${{ env.MERGED_COUNT }} merged · ${{ env.SKIPPED_COUNT }} skipped · ${{ env.IGNORED_COUNT }} ignored

            Label rules:
              ✅ 'enhancement'  → merged
              ⏭️  'help wanted'  → skipped (not ready)
              ⚪ no label       → ignored

            Full details:
            ${{ env.MERGE_SUMMARY }}
