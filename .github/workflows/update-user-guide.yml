name: Update User Guide on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'tavro_app/src/pages/**'
      - 'tavro_app/src/components/**'
  workflow_dispatch:   # allows manual trigger from GitHub UI for testing

permissions:
  contents: write
  pull-requests: write

jobs:
  update-guide:
    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ── 2. Setup Node ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tavro_app/package-lock.json

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        working-directory: tavro_app
        run: npm ci

      # ── TEST 1: Build check ────────────────────────────────────────────────
      - name: "[Test 1] App builds without errors"
        working-directory: tavro_app
        run: npm run build

      # ── 4. Install Claude Code CLI ─────────────────────────────────────────
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # ── 5. Run the update-user-guide workflow ──────────────────────────────
      - name: Understand changes and update user guide
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --workflow .claude/workflows/update-user-guide.js \
                 --output-file /tmp/guide-patch.json \
                 --non-interactive
        timeout-minutes: 10

      # ── 6. Log workflow result ─────────────────────────────────────────────
      # The workflow directly edits UserGuidePage.tsx via the Edit tool.
      # No separate patch application needed.
      - name: Log guide update result
        run: |
          node - <<'EOF'
          import { readFileSync } from 'fs';
          const result = JSON.parse(readFileSync('/tmp/guide-patch.json', 'utf8'));
          if (result.no_changes_needed) {
            console.log('Guide already up to date — no edits needed.');
          } else {
            console.log('Sections updated:', (result.edited_sections ?? []).join(', '));
            console.log('Summary:', result.summary);
          }
          EOF
        shell: node {0}

      # ── TEST 2: Updated guide compiles ────────────────────────────────────
      - name: "[Test 2] Updated guide compiles"
        working-directory: tavro_app
        run: npx tsc --noEmit

      # ── 7. Check if anything changed ──────────────────────────────────────
      - name: Check for guide changes
        id: check_changes
        run: |
          git diff --quiet tavro_app/src/pages/UserGuidePage.tsx \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true"  >> $GITHUB_OUTPUT

      # ── 8. Open a PR with the updated guide ───────────────────────────────
      - name: Open guide update PR
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="docs/user-guide-update-${{ github.run_number }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add tavro_app/src/pages/UserGuidePage.tsx
          git commit -m "docs: update user guide after PR #${{ github.event.pull_request.number }}

          Triggered by: ${{ github.event.pull_request.title }}
          PR: ${{ github.event.pull_request.html_url }}

          Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          git push origin "$BRANCH"

          gh pr create \
            --title "docs: update user guide after \"${{ github.event.pull_request.title }}\"" \
            --body "$(cat <<'PREOF'
          ## Auto-generated User Guide Update

          Triggered by merging:
          **#${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}**

          ### Tests passed
          - ✅ Test 1 — App builds without errors
          - ✅ Test 2 — Updated guide compiles

          ### Review checklist
          - [ ] New feature is correctly described
          - [ ] No unrelated sections were changed
          - [ ] Approve and merge when satisfied

          > Automated by the \`update-user-guide\` workflow.
          PREOF
          )" \
            --base main \
            --head "$BRANCH" \
            --label "documentation"

      # ── 9. Nothing to update ───────────────────────────────────────────────
      - name: Guide already up to date
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "No guide changes needed — user guide is already up to date."
