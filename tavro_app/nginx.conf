# ── tavro_app/nginx.conf ─────────────────────────────────────────────────────
server {
    listen 80;

    # Serve the React SPA — all unknown routes return index.html
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API calls to FastAPI container
    # This eliminates CORS — browser only ever talks to one origin
    location /api/ {
        proxy_pass         http://tavro-api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;    # allow time for AI research calls
        proxy_send_timeout 120s;
    }

    location /copilot-api/ {
        proxy_pass         http://copilot-sdk:4000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /docs {
        proxy_pass http://tavro-api:8000/docs;
    }

    location /openapi.json {
        proxy_pass http://tavro-api:8000/openapi.json;
    }

    # Health check passthrough
    location /health {
        proxy_pass http://tavro-api:8000/health;
    }
}
