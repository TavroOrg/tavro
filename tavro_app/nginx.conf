# ── tavro_app/nginx.conf ─────────────────────────────────────────────────────
server {
    listen 80;
    client_max_body_size 50m;
    resolver 127.0.0.11 valid=10s;

    # Serve the React SPA — all unknown routes return index.html
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API calls to FastAPI container
    # This eliminates CORS — browser only ever talks to one origin
    location /api/ {
        set $api_upstream http://tavro-api:8000;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;    # allow time for AI research calls
        proxy_send_timeout 300s;
    }

    location /copilot-api/ {
        proxy_pass         http://copilot-sdk:4000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /docs {
        proxy_pass http://tavro-api:8000/docs;
    }

    location /openapi.json {
        proxy_pass http://tavro-api:8000/openapi.json;
    }

    # Health check passthrough
    location /health {
        proxy_pass http://tavro-api:8000/health;
    }

    # Temporal Workflows — Web UI
    location /temporal {
        proxy_pass http://risk-temporal:8233/temporal;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # MCP server — all routes
    location /mcp/ {
        proxy_pass http://risk-mcp-server:9001/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header Connection        '';
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # MCP OAuth proxy — root-level endpoints (authorize, token, register, well-known)
    location /authorize {
        proxy_pass         http://risk-mcp-server:9001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /token {
        proxy_pass         http://risk-mcp-server:9001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /register {
        proxy_pass         http://risk-mcp-server:9001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /.well-known/ {
        proxy_pass         http://risk-mcp-server:9001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # MCP server — Zitadel OAuth provider
    location /zitadel/ {
        set $mcp_upstream http://risk-mcp-server:9001;
        proxy_pass         $mcp_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # MCP server — Google OAuth provider
    location /google/ {
        set $mcp_upstream http://risk-mcp-server:9001;
        proxy_pass         $mcp_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }
}